services:
  valkey:
    image: valkey/valkey-bundle:unstable
    profiles: [valkey]
    ports:
      - "6379:6379"
    command: ["--protected-mode", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mock-embedder:
    build:
      context: tests/mock_embedder
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9999/health')"]
      interval: 3s
      timeout: 2s
      retries: 10

  # Vecdex API server для локальной разработки (remote Valkey)
  vecdex:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ONNXRUNTIME_VERSION: ${ONNXRUNTIME_VERSION:-1.24.4}
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      - ENV=local

  # Test runner для CI-like окружения (Valkey-only stack)
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: go-base
      args:
        ONNXRUNTIME_VERSION: ${ONNXRUNTIME_VERSION:-1.24.4}
    working_dir: /workspace
    volumes:
      - .:/workspace
    depends_on:
      valkey:
        condition: service_healthy
      mock-embedder:
        condition: service_healthy
    environment:
      - ENV=docker
      - VALKEY_ADDR=valkey:6379
    command: >
      sh -c "
        go mod download &&
        go test ./... -v
      "
